version: "3.9"

services:
  db:
    image: postgres:15
    container_name: enterprise-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: users_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: services/app/Dockerfile
    container_name: enterprise-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: postgresql+psycopg2://postgres:postgres123@db:5432/users_db
    ports:
      - "8000:8000"
    restart: always

volumes:
  pgdata:
